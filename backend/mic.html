<!DOCTYPE html>
<html>
<body>

<h2>Voice Practice</h2>

<h3>Choose scenario</h3>

<button onclick="setScenario('grocery')">🛒 Grocery</button>
<button onclick="setScenario('doctor')">🩺 Doctor</button>
<button onclick="setScenario('bus')">🚌 Bus</button>
<button onclick="setScenario('school')">🏫 School</button>

<br><br>

<button onclick="startRecording()">Start</button>
<button onclick="stopRecording()">Stop</button>

<hr>

<div id="transcript" style="font-family: sans-serif; max-width: 600px;">
  <em>Transcript will appear here after you speak...</em>
</div>

<script>

let recorder
let chunks = []
let scenario = "grocery"

function setScenario(s) {
    scenario = s
    console.log("Scenario:", scenario)
}

async function startRecording() {
    chunks = []
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
    recorder = new MediaRecorder(stream)
    recorder.ondataavailable = e => chunks.push(e.data)
    recorder.start()
}

async function stopRecording() {

    recorder.stop()

    recorder.onstop = async () => {

        const blob = new Blob(chunks, { type: "audio/webm" })
        chunks = []

        const form = new FormData()
        form.append("file", blob, "audio.webm")

        const res = await fetch(`http://127.0.0.1:8000/voice-chat?scenario=${scenario}`, {
            method: "POST",
            body: form
        })

        const data = await res.json()

        // Show transcript
        const box = document.getElementById("transcript")
        const userLine = document.createElement("p")
        userLine.innerHTML = `<strong>You:</strong> ${data.user_text}`
        box.appendChild(userLine)

        const aiReply = data.response?.character_response || ""
        const correction = data.response?.correction || null

        const aiLine = document.createElement("p")
        aiLine.innerHTML = `<strong>AI:</strong> ${aiReply}`
        box.appendChild(aiLine)

        if (correction) {
            const corrLine = document.createElement("p")
            corrLine.innerHTML = `<em>💡 Try saying: "${correction}"</em>`
            corrLine.style.color = "teal"
            box.appendChild(corrLine)
        }

        // Play audio via /speak
        const speakRes = await fetch("http://127.0.0.1:8000/speak", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: aiReply })
        })

        const audioBlob = await speakRes.blob()
        const audioUrl = URL.createObjectURL(audioBlob)
        const audio = new Audio(audioUrl)
        audio.play()
    }
}

</script>

</body>
</html>
