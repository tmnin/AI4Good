<!DOCTYPE html>
<html>
<body>

<h2>Voice Practice</h2>

<h3>Everyday Scenarios</h3>

<button onclick="setScenario('food')">🛒 Food</button>
<button onclick="setScenario('bus')">🚌 Bus</button>
<button onclick="setScenario('doctor')">🏥 Doctor</button>
<button onclick="setScenario('school')">👶 School</button>
<button onclick="setScenario('medicine')">💊 Medicine</button>
<button onclick="setScenario('work')">👷 Work</button>
<button onclick="setScenario('house')">🏠 House</button>
<button onclick="setScenario('bank')">💰 Bank</button>
<button onclick="setScenario('community')">🕌 Community</button>
<button onclick="setScenario('restaurant')">🍽️ Restaurant</button>

<h3>Emergency Scenarios</h3>

<button onclick="setScenario('emergency')">🚨 911 Call</button>
<button onclick="setScenario('police')">👮 Police</button>
<button onclick="setScenario('hospital')">🏥 Hospital</button>
<button onclick="setScenario('shelter')">🏠 Shelter</button>

<br><br>

<button onclick="startRecording()">Start</button>
<button onclick="stopRecording()">Stop</button>

<script>

let recorder
let chunks = []
let scenario = "food"

function setScenario(s) {
    scenario = s
    console.log("Scenario:", scenario)
}

async function startRecording() {
    chunks = []
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
    recorder = new MediaRecorder(stream)
    recorder.ondataavailable = e => chunks.push(e.data)
    recorder.start()
}

async function stopRecording() {

    recorder.stop()

    recorder.onstop = async () => {

        const blob = new Blob(chunks, { type: "audio/webm" })
        chunks = []

        const form = new FormData()
        form.append("file", blob, "audio.webm")

        const res = await fetch(`/voice-chat?scenario=${scenario}`, {
            method: "POST",
            body: form
        })

        if (!res.ok) {
            console.error("Server error")
            return
        }

        const audioBlob = await res.blob()

        const audioUrl = URL.createObjectURL(audioBlob)

        const audio = new Audio(audioUrl)

        audio.onended = () => {
            URL.revokeObjectURL(audioUrl)
        }

        try {
            await audio.play()
        } catch (err) {
            console.error("Audio playback failed:", err)
        }
    }
}

</script>

</body>
</html>
