<!DOCTYPE html>
<html>
<body>

<h2>Voice Practice</h2>

<h3>Everyday Scenarios</h3>

<button onclick="setScenario('grocery')">🛒 Grocery</button>
<button onclick="setScenario('doctor')">🩺 Doctor</button>
<button onclick="setScenario('bus')">🚌 Bus</button>
<button onclick="setScenario('school')">🏫 School</button>

<h3>Emergency Scenarios</h3>

<button onclick="setScenario('emergency')">🚨 911 Call</button>
<button onclick="setScenario('police')">👮 Police</button>
<button onclick="setScenario('hospital')">🏥 Hospital ER</button>
<button onclick="setScenario('shelter')">🏠 Shelter</button>

<br><br>

<button onclick="startRecording()">Start</button>
<button onclick="stopRecording()">Stop</button>

<script>

let recorder
let chunks = []
let scenario = "grocery"

function setScenario(s) {
    scenario = s
    console.log("Scenario:", scenario)
}

async function startRecording() {
    chunks = []
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
    recorder = new MediaRecorder(stream)
    recorder.ondataavailable = e => chunks.push(e.data)
    recorder.start()
}

async function stopRecording() {

    recorder.stop()

    recorder.onstop = async () => {

        const blob = new Blob(chunks, { type: "audio/webm" })
        chunks = []

        const form = new FormData()
        form.append("file", blob, "audio.webm")

        const res = await fetch(`http://127.0.0.1:8000/voice-chat?scenario=${scenario}`, {
            method: "POST",
            body: form
        })

        const audioBlob = await res.blob()
        const audioUrl = URL.createObjectURL(audioBlob)
        const audio = new Audio(audioUrl)
        audio.play()
    }
}

</script>

</body>
</html>
